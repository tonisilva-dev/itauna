server {
    listen 80;
    listen [::]:80;
    server_name itauna.org www.itauna.org;

    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itauna.org www.itauna.org;

    root /var/www/itauna/dist;
    index index.html;

    # SSL — gerado pelo Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/itauna.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itauna.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (JS/CSS/imagens)
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection "1; mode=block"       always;
    add_header Referrer-Policy "strict-origin"        always;
    add_header Permissions-Policy "geolocation=()"    always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Logs
    access_log /var/log/nginx/itauna.access.log;
    error_log  /var/log/nginx/itauna.error.log;
}
